<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDash Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bot-bubble: rgba(30, 41, 59, 0.9);
            --user-bubble: #6366f1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        .agent-badge {
            font-size: 0.75rem;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: slideIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .message-wrapper.user {
            align-self: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
        }

        .message {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message.user {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .message.bot {
            background: var(--bot-bubble);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .chat-input-container {
            padding: 20px 24px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid var(--border-color);
        }

        .chat-form {
            display: flex;
            gap: 12px;
            position: relative;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .chat-submit {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .chat-submit:active {
            transform: translateY(0);
        }

        .typing-indicator {
            display: none;
            padding: 12px 18px;
            background: var(--bot-bubble);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: max-content;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <div class="status-dot"></div>
                <h2>CloudDash Support</h2>
            </div>
            <div class="agent-badge" id="agentBadge">Connecting...</div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be injected here -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <form class="chat-form" id="chatForm">
                <input type="text" class="chat-input" id="messageInput" placeholder="Type your message here..." autocomplete="off" disabled>
                <button type="submit" class="chat-submit" id="submitBtn" disabled>Send</button>
            </form>
        </div>
    </div>

    <script>
        // Auto-detect backend: relative path works when served from FastAPI,
        // override with env if needed (e.g. local file:// testing)
        const API_URL = window.location.protocol === 'file:'
            ? 'http://localhost:8001'
            : '';
        let sessionId = null;

        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const submitBtn = document.getElementById('submitBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const agentBadge = document.getElementById('agentBadge');

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${sender}`;
            
            const message = document.createElement('div');
            message.className = `message ${sender}`;
            message.textContent = text;
            
            wrapper.appendChild(message);
            chatMessages.insertBefore(wrapper, typingIndicator);
            scrollToBottom();
        }

        function setTyping(isTyping) {
            typingIndicator.style.display = isTyping ? 'flex' : 'none';
            scrollToBottom();
        }

        async function initChat() {
            try {
                const response = await fetch(`${API_URL}/conversation/start`, {
                    method: 'POST'
                });
                const data = await response.json();
                sessionId = data.session_id;
                
                agentBadge.textContent = 'Agent: Triage';
                messageInput.disabled = false;
                submitBtn.disabled = false;
                
                appendMessage(data.message, 'bot');
                messageInput.focus();
            } catch (error) {
                console.error('Failed to connect to backend', error);
                agentBadge.textContent = 'Offline';
                agentBadge.style.color = '#ef4444';
                agentBadge.style.background = 'rgba(239, 68, 68, 0.2)';
                appendMessage('Error connecting to the support server. Is the FastAPI backend running?', 'bot');
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !sessionId) return;

            // Optimistic UI update
            appendMessage(text, 'user');
            messageInput.value = '';
            messageInput.disabled = true;
            submitBtn.disabled = true;
            setTyping(true);

            try {
                const response = await fetch(`${API_URL}/conversation/${sessionId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                // Update Agent Badge dynamically
                const agentName = data.agent.replace('_', ' ');
                agentBadge.textContent = `Agent: ${agentName}`;
                
                setTyping(false);
                appendMessage(data.response, 'bot');
            } catch (error) {
                setTyping(false);
                appendMessage('Sorry, something went wrong. Please try again.', 'bot');
            } finally {
                messageInput.disabled = false;
                submitBtn.disabled = false;
                messageInput.focus();
            }
        });

        // Initialize chat on load
        window.addEventListener('load', initChat);
    </script>
</body>
</html>
